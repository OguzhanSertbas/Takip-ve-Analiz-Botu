# --- API Anahtarları ---
alpaca:
  api_key: "ALPACA_API_KEY_BURAYA"
  secret_key: "ALPACA_SECRET_KEY_BURAYA"
  base_url: "https://paper-api.alpaca.markets"   # Paper trading
  data_url: "https://data.alpaca.markets"

# --- Telegram (Çift Yönlü) ---
telegram:
  enabled: true
  bot_token: "TELEGRAM_BOT_TOKEN_BURAYA"
  chat_id: "TELEGRAM_CHAT_ID_BURAYA"

# --- Tarama Kapsamı ---
# Faz 1: Sadece US aktif
markets:
  us:
    enabled: true
    source: "alpaca"          # alpaca veya yfinance
    min_price: 10             # $10 altı hisseler hariç
    min_avg_volume: 500000    # Günlük ort. hacim min 500K
    max_stocks: 80            # Taramada max hisse sayısı
  bist:
    enabled: false            # Faz 2'de aktif olacak
    source: "yfinance"
  crypto:
    enabled: false            # Faz 3

